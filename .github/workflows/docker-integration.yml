name: Docker Integration Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: python-3.10
            base: python:3.10-slim
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          docker build --build-arg BASE_IMAGE=${{ matrix.base }} -t news-aggregator:${{ matrix.name }} news_aggregator

      - name: Run integration tests inside container
        run: |
          docker run --rm news-aggregator:${{ matrix.name }} /bin/bash -c "NEWS_AGG_PORT=5001 ./tests/run_in_container_tests.sh"
