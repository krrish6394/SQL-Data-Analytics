<!-- templates/upload.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Text Data</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container">
  <h1 class="mt-5">Upload Text Data</h1>
  <form id="upload-form" class="mt-4" enctype="multipart/form-data" method="post">
    <div class="form-group">
      <label for="file">Select CSV file</label>
      <input type="file" class="form-control-file" id="file" name="file" accept=".csv" required>
    </div>
    <button type="submit" class="btn btn-primary">Upload</button>
  </form>
  <div id="upload-result" class="mt-4"></div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
  $(document).ready(function () {
    $('#upload-form').on('submit', function (event) {
      event.preventDefault();
      const formData = new FormData(this);
      $.ajax({
        url: '/upload',
        type: 'POST',
        data: formData,
        processData: false,
        contentType: false,
        success: function (data) {
          $('#upload-result').html('<h4>' + data.message + '</h4>');
        },
        error: function (xhr) {
          const resp = xhr.responseJSON || {message: 'Error'};
          $('#upload-result').html('<h4>' + resp.message + '</h4>');
        }
      });
    });
  });
</script>
</body>
</html>
